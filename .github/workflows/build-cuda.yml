name: build-cuda

on:
  push:
    tags:
      - 'cuda-v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The vLLM CUDA base image (~10 GB extracted) plus flashinfer-jit-cache
      # and eval deps exceed the ~14 GB free on a default ubuntu-latest runner.
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force
          df -h

      # Tag scheme: cuda-vX.Y.Z-N. The vLLM upstream version is embedded in the
      # git tag and used to derive the BASE_IMAGE so the two can't drift.
      - name: Derive vLLM base image from tag
        id: base
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^cuda-(v[0-9]+\.[0-9]+\.[0-9]+)-[0-9]+$ ]]; then
            echo "::error::tag '$tag' must look like cuda-vX.Y.Z-N (e.g. cuda-v0.21.0-1)"
            exit 1
          fi
          vllm_version="${BASH_REMATCH[1]}"
          base_image="vllm/vllm-openai:${vllm_version}"
          echo "base_image=${base_image}" >>"$GITHUB_OUTPUT"
          echo "Resolved base image: ${base_image}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Immutable per-build tag, taken verbatim from the git tag (cuda-vX.Y.Z-N)
            type=ref,event=tag
            # Floating per-vLLM-version tag: cuda-vX.Y.Z-N -> cuda-vX.Y.Z
            type=match,pattern=(cuda-v\d+\.\d+\.\d+)-\d+,group=1
            # Floating overall-latest CUDA tag, only on properly-formatted release tags
            type=raw,value=latest-cuda,enable=${{ startsWith(github.ref, 'refs/tags/cuda-v') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.base_image }}
            ACCEL=cuda
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cuda
          cache-to: type=gha,mode=max,scope=cuda
