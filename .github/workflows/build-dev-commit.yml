name: build-dev-commit

# Manual-only: build the bridge against an UNRELEASED vLLM dev commit by
# overlaying a pinned per-commit wheel from wheels.vllm.ai onto a released base
# (see "Building against an unreleased vLLM dev commit" in CLAUDE.md).
#
# The release flow (build-cuda.yml / build-rocm.yml) is tag-triggered and derives
# BASE_IMAGE from a semver tag. A dev commit has no such tag or upstream image, so
# it lives here behind an explicit dispatch with fully-pinned inputs. This job
# pushes ONLY the immutable dev tag you supply — never the floating release tags.
on:
  workflow_dispatch:
    inputs:
      accel:
        description: Accelerator stream
        type: choice
        options: [cuda, rocm]
        default: cuda
      base_image:
        description: Released vLLM base to overlay onto (must share the commit's torch pin)
        required: true
        default: vllm/vllm-openai:v0.23.0
      vllm_wheel_url:
        description: Immutable per-commit wheel URL (https://wheels.vllm.ai/<full-sha>/...whl)
        required: true
      vllm_wheel_sha256:
        description: sha256 checksum of the wheel
        required: true
      flashinfer_version:
        description: flashinfer pin for the commit (vLLM docker/Dockerfile ARG FLASHINFER_VERSION)
        required: true
        default: 0.6.13
      image_tag:
        description: Immutable dev tag, e.g. cuda-0.22.1rc1.dev164-ga6183563b-1 (must NOT look like a release tag)
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Refuse tags that collide with the release scheme/floaters so a dev build
      # can never overwrite a release artifact (mirrors "never overwrite an -N
      # tag"). Input is passed via env, not interpolated into the shell.
      - name: Validate dev image tag
        env:
          TAG: ${{ inputs.image_tag }}
        run: |
          if [[ "$TAG" =~ ^(cuda|rocm)-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$ ]] \
             || [[ "$TAG" == "latest-cuda" || "$TAG" == "latest-rocm" ]]; then
            echo "::error::'$TAG' looks like a release tag/floater; pick a dev-only tag (e.g. cuda-0.22.1rc1.dev164-ga6183563b-1)"
            exit 1
          fi

      # The vLLM base image (~10-12 GB extracted) plus flashinfer-jit-cache and
      # eval deps exceed the ~14 GB free on a default ubuntu-latest runner.
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force
          df -h

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}
            ACCEL=${{ inputs.accel }}
            FLASHINFER_VERSION=${{ inputs.flashinfer_version }}
            VLLM_WHEEL_URL=${{ inputs.vllm_wheel_url }}
            VLLM_WHEEL_SHA256=${{ inputs.vllm_wheel_sha256 }}
          # Single immutable dev tag — no floaters. Reuse the release cache for
          # the shared apt/base layers, but write to a separate dev scope so dev
          # builds never evict release-cache entries.
          tags: ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.image_tag }}
          cache-from: |
            type=gha,scope=${{ inputs.accel }}-dev
            type=gha,scope=${{ inputs.accel }}
          cache-to: type=gha,mode=max,scope=${{ inputs.accel }}-dev
