name: build-rocm

on:
  push:
    tags:
      - 'rocm-nightly-*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The vLLM ROCm base image (~12 GB compressed) plus eval deps exceed the
      # ~14 GB free on a default ubuntu-latest runner.
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force
          df -h

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Upstream vLLM does not yet publish semver-pinned ROCm runtime images
      # (only nightlies). Pin to the digest the `nightly` tag points to right
      # now so the build is reproducible, and surface that digest in image
      # labels so consumers can trace back to the exact upstream nightly.
      - name: Resolve ROCm nightly to digest
        id: base
        run: |
          nightly_ref="vllm/vllm-openai-rocm:nightly"
          digest=$(docker buildx imagetools inspect "$nightly_ref" \
                   --format '{{ .Manifest.Digest }}')
          if [ -z "$digest" ]; then
            echo "::error::failed to resolve $nightly_ref to a digest"
            exit 1
          fi
          echo "Resolved $nightly_ref -> $digest"
          echo "base_image=vllm/vllm-openai-rocm@${digest}" >>"$GITHUB_OUTPUT"
          echo "base_digest=${digest}" >>"$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Immutable per-build tag, taken verbatim from the git tag
            # (rocm-nightly-YYYYMMDD-N). The date is the day the build was
            # tagged; the actual upstream digest is in the image labels.
            type=ref,event=tag
            # Floating overall-latest ROCm tag
            type=raw,value=latest-rocm,enable=${{ startsWith(github.ref, 'refs/tags/rocm-nightly-') }}
          labels: |
            org.opencontainers.image.base.name=vllm/vllm-openai-rocm:nightly
            org.opencontainers.image.base.digest=${{ steps.base.outputs.base_digest }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.base_image }}
            ACCEL=rocm
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rocm
          cache-to: type=gha,mode=max,scope=rocm
